<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SEO Command Center — Live Cockpit</title>
<style>
:root{--ink:#1a1a1f;--card:#242428;--line:#3a3a42;--paper:#f8f7f4;--mute:#c8c5be;--red:#FF0000;--yellow:#e2b53e;--green:#4caf7d}
*{box-sizing:border-box}body{margin:0;background:var(--ink);color:var(--paper);font-family:Inter,system-ui,sans-serif}
header{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
h1{font-size:17px;margin:0}h1 .dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--red);margin-right:8px;animation:p 1.6s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
.pill{font-size:12px;color:var(--mute);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:5px 12px}
.main{padding:18px 22px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px}
.card h2{font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--mute);margin:0 0 12px}
.k{display:flex;gap:22px;flex-wrap:wrap}.k div{font-size:12px;color:var(--mute)}.k b{display:block;font-size:26px;color:var(--paper)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--line)}
th{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute)}
.sev{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px}
.sev.high{background:var(--red);color:#fff}
.sev.medium{background:var(--yellow);color:#1a1a1f}
.sev.low{background:var(--line);color:var(--mute)}
.expand-btn{cursor:pointer;font-size:11px;color:var(--mute);user-select:none;white-space:nowrap}
.expand-btn:hover{color:var(--paper)}
.url-row td{background:rgba(0,0,0,.18);padding:5px 8px}
.url-cell a{color:#7ca4d4;font-size:11.5px;text-decoration:none;word-break:break-all}
.url-cell a:hover{text-decoration:underline}
.fix-cell{min-width:260px}
.fix-tag{font-size:10px;font-weight:700;color:var(--green);margin-right:6px;white-space:nowrap}
.fix-val{font-size:11.5px;color:#b5e0c8;word-break:break-all}
.fix-none{color:var(--line);font-size:12px}
.issue-type{font-weight:600;font-size:12.5px}
.url-count{font-weight:700;color:var(--paper)}
.empty{color:var(--mute);font-size:13px}
</style></head><body>
<header>
  <h1><span class="dot"></span>SEO Command Center <span class="pill" id="meta">idle</span></h1>
  <div class="pill" id="urls">0 URLs</div>
</header>
<div class="main">
  <div class="card k" id="counts">
    <div><b id="c-total">0</b>issues</div>
    <div><b id="c-high" style="color:var(--red)">0</b>high</div>
    <div><b id="c-med" style="color:var(--yellow)">0</b>medium</div>
    <div><b id="c-low">0</b>low</div>
  </div>
  <div class="card">
    <h2>Issues found (live)</h2>
    <div style="overflow-x:auto">
      <table id="tbl">
        <thead>
          <tr>
            <th style="width:72px">Severity</th>
            <th style="width:200px">Issue</th>
            <th style="width:50px">URLs</th>
            <th>Affected URLs &amp; Suggested Fix</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="4" class="empty">Waiting for the audit to run…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="/app.js"></script></body></html>
